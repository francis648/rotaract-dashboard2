<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Rotaract Members</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ✅ Mobile responsiveness -->
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f8f9fa; }
    h2 { margin-bottom: 10px; color: #003566; }
    .controls { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
    input, select, button { padding: 6px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #0077b6; color: white; }
    tr:nth-child(even) { background: #f1f1f1; }
    .logout { float: right; background: #dc3545; color: #fff; border: none; padding: 8px 12px; cursor: pointer; }
    .logout:hover { background: #a71d2a; }
    .pagination { margin-top: 20px; text-align: center; }
    .pagination button { margin: 0 5px; padding: 6px 12px; }
    .superadmin-only { background: #28a745; color: #fff; border: none; padding: 8px 12px; cursor: pointer; }
    .superadmin-only:hover { background: #1e7e34; }
    .delete-btn { background: #dc3545; color: #fff; border: none; padding: 6px 10px; cursor: pointer; }
    .delete-btn:hover { background: #a71d2a; }

    /* ✅ Responsive table for mobile */
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      th { position: absolute; top: -9999px; left: -9999px; }
      tr { margin-bottom: 10px; }
      td { border: none; position: relative; padding-left: 50%; }
      td:before { 
        position: absolute; 
        left: 10px; 
        width: 45%; 
        white-space: nowrap; 
        font-weight: bold; 
        color: #003566;
      }
    }
  </style>
</head>
<body>
  <h2>Rotaract Admin Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>

  <div class="controls">
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportExcel()">Export Excel</button>
    <button class="superadmin-only" onclick="showRegisterForm()">Register Admin</button>
  </div>

  <table id="membersTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Club</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="pagination" id="pagination"></div>

  <script>
    const backendUrl = "https://rotaract-dashboard2.onrender.com";

    async function fetchMembers(page = 1) {
      try {
        const res = await fetch(`${backendUrl}/members?page=${page}`, {
          credentials: "include"
        });
        const members = await res.json();
        const tbody = document.querySelector("#membersTable tbody");
        tbody.innerHTML = "";
        members.forEach(m => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${m.id}</td>
            <td>${m.first_name}</td>
            <td>${m.last_name}</td>
            <td>${m.email}</td>
            <td>${m.phone}</td>
            <td>${m.club_name}</td>
            <td><button class="delete-btn" onclick="deleteMember(${m.id})">Delete</button></td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error("Error fetching members:", err);
      }
    }

    async function deleteMember(id) {
      if (!confirm("Are you sure you want to delete this member?")) return;
      try {
        await fetch(`${backendUrl}/members/${id}`, {
          method: "DELETE",
          credentials: "include"
        });
        fetchMembers();
      } catch (err) {
        console.error("Error deleting member:", err);
      }
    }

    function exportCSV() {
      window.location.href = `${backendUrl}/export/csv`;
    }

    function exportExcel() {
      window.location.href = `${backendUrl}/export/excel`;
    }

    async function logout() {
      await fetch(`${backendUrl}/logout`, { method: "POST", credentials: "include" });
      window.location.href = "/login.html";
    }

    function showRegisterForm() {
      alert("Superadmin registration form goes here.");
    }

    // Load members on page load
    fetchMembers();
  </script>
</body>
</html>
